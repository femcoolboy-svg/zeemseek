<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZeemSeek Ultra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', sans-serif;
            background: #07070a;
            color: #e4e4e7;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #0c0c10;
            border-right: 1px solid #1f1f2a;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .new-chat {
            margin: 16px;
            padding: 10px 16px;
            background: #12121a;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            color: #e4e4e7;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .new-chat:hover {
            background: #1a1a24;
            border-color: #3a6a3a;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 4px;
            cursor: pointer;
            color: #8888a0;
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item:hover {
            background: #12121a;
            color: #c4c4d0;
        }

        .chat-item.active {
            background: #1a1a24;
            color: #5a9a5a;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #1f1f2a;
            font-size: 11px;
            color: #4a4a55;
            text-align: center;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #07070a;
        }

        .header {
            padding: 12px 24px;
            border-bottom: 1px solid #1f1f2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #8888a0;
        }

        .logo span {
            font-size: 20px;
        }

        .status {
            font-size: 11px;
            color: #4a4a55;
        }

        /* Chat */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
        }

        .messages {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .message {
            display: flex;
            gap: 14px;
            margin-bottom: 24px;
            animation: fadeIn 0.25s ease;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: #12121a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .content {
            flex: 1;
            line-height: 1.55;
            font-size: 14px;
            color: #d4d4dc;
        }

        .content p {
            margin-bottom: 10px;
        }

        .content pre {
            background: #0c0c10;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            border: 1px solid #1f1f2a;
            margin: 10px 0;
        }

        .content code {
            background: #0c0c10;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }

        /* Input */
        .input-area {
            border-top: 1px solid #1f1f2a;
            background: #07070a;
            padding: 16px 24px 24px;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        textarea {
            width: 100%;
            background: #0c0c10;
            border: 1px solid #2a2a35;
            border-radius: 20px;
            padding: 12px 48px 12px 18px;
            color: #e4e4e7;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border 0.2s;
        }

        textarea:focus {
            border-color: #5a9a5a;
        }

        .send-btn {
            position: absolute;
            right: 10px;
            bottom: 8px;
            background: #1a1a24;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 17px;
            cursor: pointer;
            color: #8888a0;
            font-size: 16px;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: #2a2a35;
            color: #5a9a5a;
        }

        /* Typing */
        .typing {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #5a9a5a;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 60%, 100% { opacity: 0.25; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0c0c10;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a35;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5a9a5a;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="new-chat" id="newChatBtn">+ Новый чат</div>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">ZeemSeek / ultra</div>
    </div>
    <div class="main">
        <div class="header">
            <div class="logo"><span>🐍</span> ZeemSeek</div>
            <div class="status">интеллект · активен</div>
        </div>
        <div class="chat-container" id="chatContainer">
            <div class="messages" id="messages"></div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="promptInput" rows="1" placeholder="Задайте вопрос..."></textarea>
                <button class="send-btn" id="sendBtn">↵</button>
            </div>
        </div>
    </div>
</div>

<script>
    let chats = [{ id: Date.now(), name: 'Чат 1', messages: [] }];
    let currentChatId = chats[0].id;
    let isLoading = false;

    const messagesDiv = document.getElementById('messages');
    const chatListDiv = document.getElementById('chatList');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const newChatBtn = document.getElementById('newChatBtn');

    async function askZeemSeek(prompt) {
        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await response.json();
            return data.response || 'Ответ сгенерирован.';
        } catch (error) {
            console.error('API error:', error);
            return 'Ошибка соединения. Убедитесь, что сервер запущен.';
        }
    }

    function addMessage(role, content) {
        const chat = chats.find(c => c.id === currentChatId);
        if (chat) {
            chat.messages.push({ role, content });
            renderMessages();
        }
    }

    function renderMessages() {
        const chat = chats.find(c => c.id === currentChatId);
        if (!chat) return;
        
        messagesDiv.innerHTML = '';
        chat.messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="avatar">${msg.role === 'user' ? '●' : '🐍'}</div>
                <div class="content">${escapeHtml(msg.content).replace(/\n/g, '<br>')}</div>
            `;
            messagesDiv.appendChild(div);
        });
        
        if (isLoading) {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="avatar">🐍</div>
                <div class="content"><div class="typing"><span></span><span></span><span></span></div></div>
            `;
            messagesDiv.appendChild(typingDiv);
        }
        
        messagesDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function renderChatList() {
        chatListDiv.innerHTML = '';
        chats.forEach(chat => {
            const div = document.createElement('div');
            div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
            div.textContent = chat.name;
            div.onclick = () => {
                currentChatId = chat.id;
                renderChatList();
                renderMessages();
            };
            chatListDiv.appendChild(div);
        });
    }

    async function sendMessage() {
        const text = promptInput.value.trim();
        if (!text || isLoading) return;
        
        addMessage('user', text);
        promptInput.value = '';
        promptInput.style.height = 'auto';
        
        isLoading = true;
        renderMessages();
        
        const response = await askZeemSeek(text);
        
        isLoading = false;
        const chat = chats.find(c => c.id === currentChatId);
        if (chat) {
            chat.messages.push({ role: 'assistant', content: response });
            renderMessages();
        }
    }

    function newChat() {
        const newId = Date.now();
        chats.push({ id: newId, name: `Чат ${chats.length + 1}`, messages: [] });
        currentChatId = newId;
        renderChatList();
        renderMessages();
    }

    sendBtn.onclick = sendMessage;
    newChatBtn.onclick = newChat;
    promptInput.onkeypress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    };
    promptInput.oninput = function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    };

    // Приветственное сообщение
    addMessage('assistant', 'Задайте вопрос. Я анализирую глубже, чем любой известный ИИ.');
    renderChatList();
</script>
</body>
</html>
